<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso — SEO Reports · Mentalidad Web</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --dark: #111111;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --text: #f0f0f0;
      --muted: #888;
      --green: #1A6B3A;
      --green-light: #22a854;
      --green-bg: #0d1a11;
      --green-border: #1e4730;
      --red: #ff7b72;
      --radius: 12px;
    }

    body {
      background: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      color: var(--text);
      padding: 24px;
    }

    /* subtle background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 900px 600px at 50% -100px, rgba(26,107,58,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 400px 400px at 80% 80%, rgba(26,107,58,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 430px;
      box-shadow:
        0 0 0 1px rgba(26,107,58,0.08),
        0 24px 80px rgba(0,0,0,0.6),
        0 4px 20px rgba(0,0,0,0.4);
    }

    /* Logo area */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 36px;
    }
    .brand-icon {
      width: 46px; height: 46px;
      background: var(--green);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: 0.5px;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(26,107,58,0.35);
    }
    .brand-text { line-height: 1.2; }
    .brand-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.2px;
    }
    .brand-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* Form fields */
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .field input::placeholder { color: #555; }
    .field input:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(26,107,58,0.18);
    }
    .field input:focus-visible { outline: none; }

    /* Error message */
    .error-msg {
      background: rgba(255,123,114,0.1);
      border: 1px solid rgba(255,123,114,0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      margin-top: 8px;
      letter-spacing: 0.2px;
    }
    .btn-submit:hover:not(:disabled) { background: var(--green-light); }
    .btn-submit:active:not(:disabled) { transform: scale(0.99); }
    .btn-submit:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Domain hint */
    .domain-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--green-bg);
      border: 1px solid var(--green-border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #6bcf8e;
      margin-top: 20px;
    }
    .domain-hint svg { flex-shrink: 0; }

    /* Google button */
    #google-section { display: none; }
    .btn-google {
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 12px 16px;
      background: var(--surface2); color: var(--text);
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 15px; font-weight: 500; font-family: inherit;
      text-decoration: none; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-google:hover { background: #2c2c2c; border-color: #555; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }
    .divider span { font-size: 12px; color: #555; white-space: nowrap; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .login-footer {
      margin-top: 28px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">
      <div class="brand-icon">MW</div>
      <div class="brand-text">
        <div class="brand-title">SEO Reports</div>
        <div class="brand-sub">Mentalidad Web</div>
      </div>
    </div>

    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresa con tu correo corporativo para acceder al sistema.</p>

    <div id="error-msg" class="error-msg" style="display:none">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="error-text"></span>
    </div>

    <form id="login-form" autocomplete="on">
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" name="email"
               placeholder="tu@mentalidadweb.com"
               autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••"
               autocomplete="current-password" required />
      </div>
      <button type="submit" id="submit-btn" class="btn-submit">Ingresar</button>
    </form>

    <!-- Google Sign-In — link directo, sin SDK de Google en frontend -->
    <div id="google-section" style="display:none">
      <div class="divider"><span>o continúa con</span></div>
      <a href="/auth/google/init" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </a>
    </div>

    <div class="domain-hint">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Acceso restringido a correos <strong style="margin-left:3px">@mentalidadweb.com</strong>
    </div>
  </div>

  <div class="login-footer">© 2026 Mentalidad Web Ltda · Sistema interno</div>

  <script>
    const errEl = document.getElementById('error-msg');
    const txtEl = document.getElementById('error-text');

    function showError(msg) {
      txtEl.textContent   = msg;
      errEl.style.display = 'flex';
    }
    function hideError() { errEl.style.display = 'none'; }

    // ── Email + password ────────────────────────────────────────────────────
    document.getElementById('email').focus();

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.innerHTML = '<span class="spinner"></span>Verificando…';
      btn.disabled  = true;
      hideError();

      try {
        const res = await fetch('/auth/login', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            email:    document.getElementById('email').value.trim(),
            password: document.getElementById('password').value,
          }),
          credentials: 'same-origin',
        });
        if (res.ok) { window.location.href = '/'; return; }
        const data = await res.json().catch(() => ({}));
        showError(data.error || 'Error al iniciar sesión.');
      } catch (_) {
        showError('No se pudo conectar con el servidor.');
      }
      btn.textContent = 'Ingresar';
      btn.disabled    = false;
    });

    // ── Mostrar sección Google si está configurado ──────────────────────────
    fetch('/auth/config')
      .then(r => r.json())
      .then(({ googleEnabled }) => {
        if (googleEnabled) document.getElementById('google-section').style.display = 'block';
      })
      .catch(() => {});

    // ── Mostrar errores que vienen en la URL (callback de Google) ───────────
    const urlError = new URLSearchParams(window.location.search).get('error');
    if (urlError) showError(decodeURIComponent(urlError));
  </script>
</body>
</html>
